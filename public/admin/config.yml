# local_backend: true

backend:
  name: github
  repo: kaponael/SavvinaBanti
  branch: main
  base_url: https://sbanti.com/
  auth_endpoint: api/auth

media_folder: public/uploads
public_folder: /uploads

locale: en

collections:
  - name: blog
    label: Blog Posts
    folder: src/content/blog
    create: true
    delete: true
    slug: '{{slug}}'
    format: frontmatter
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime, format: 'YYYY-MM-DD' }
      - {
          label: Description,
          name: description,
          widget: text,
          hint: 'A short summary shown on the blog listing page.',
        }
      - label: Tags
        name: tags
        widget: list
        required: false
        hint: 'Optional comma-separated tags (e.g. mental health, parenting)'
      - { label: Body, name: body, widget: markdown }
